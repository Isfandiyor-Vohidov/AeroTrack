<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2196F3;
            --background: #121212;
            --surface: #1E1E1E;
            --text-primary: #E0E0E0;
            --text-secondary: #9E9E9E;
            --border: #424242;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-container {
            text-align: center;
            background-color: var(--surface);
            border-radius: 8px;
            padding: 60px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .error-icon {
            font-size: 80px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .error-message {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .contact-info {
            background-color: var(--background);
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 30px;
        }

        .contact-info h3 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .contact-info p {
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .back-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background-color: #1976D2;
        }

        .nav-links {
            margin-top: 20px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 10px;
        }

        .nav-links a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>

        <h1 class="error-title">404</h1>
        <p class="error-message">Страница не найдена</p>

        <div class="contact-info">
            <h3><i class="fas fa-headset"></i> Нужна помощь?</h3>
            <p><i class="fas fa-phone"></i> +998 90 640 04 08</p>
            <p><i class="fas fa-envelope"></i> 1984dilshod.abdullayev@gmail.com</p>
        </div>

        <a href="index.html" class="back-btn">
            <i class="fas fa-home"></i> Вернуться на главную
        </a>

        <div class="nav-links">
            <a href="login.html">Войти</a>
            <a href="register.html">Регистрация</a>
            <a href="support.html">Поддержка</a>
        </div>
    </div>
</body>
</html>
