<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля - WebInv</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2196F3;
            --primary-dark: #1976D2;
            --background: #121212;
            --surface: #1E1E1E;
            --error: #F44336;
            --success: #4CAF50;
            --text-primary: #E0E0E0;
            --text-secondary: #9E9E9E;
            --border: #424242;
            --hover: #2A2A2A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-container {
            background-color: var(--surface);
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-header h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .reset-header p {
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--background);
            color: var(--text-primary);
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.2);
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .reset-btn:hover {
            background-color: var(--primary-dark);
        }

        .reset-btn:disabled {
            background-color: var(--text-secondary);
            cursor: not-allowed;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
            margin: 0 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .error-message {
            background-color: var(--error);
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background-color: var(--success);
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }

        .reset-form-step {
            display: none;
        }

        .reset-form-step.active {
            display: block;
        }

        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .code-input {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 18px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background-color: var(--background);
            color: var(--text-primary);
        }

        .code-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .resend-link {
            text-align: center;
            margin-top: 10px;
        }

        .resend-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
        }

        .resend-link a:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <!-- Step 1: Request reset -->
        <div id="requestStep" class="reset-form-step active">
            <div class="reset-header">
                <h1><i class="fas fa-key"></i> Сброс пароля</h1>
                <p>Введите ваш email для получения кода сброса</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="requestForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>

                <button type="submit" class="reset-btn" id="requestBtn">
                    <i class="fas fa-paper-plane"></i> Отправить код
                </button>
            </form>
        </div>

        <!-- Step 2: Verify code -->
        <div id="verifyStep" class="reset-form-step">
            <div class="reset-header">
                <h1><i class="fas fa-shield-alt"></i> Подтверждение</h1>
                <p>Введите 6-значный код из email</p>
            </div>

            <div id="verifyErrorMessage" class="error-message"></div>
            <div id="verifySuccessMessage" class="success-message"></div>

            <div class="code-inputs">
                <input type="text" class="code-input" maxlength="1" id="code1">
                <input type="text" class="code-input" maxlength="1" id="code2">
                <input type="text" class="code-input" maxlength="1" id="code3">
                <input type="text" class="code-input" maxlength="1" id="code4">
                <input type="text" class="code-input" maxlength="1" id="code5">
                <input type="text" class="code-input" maxlength="1" id="code6">
            </div>

            <button class="reset-btn" id="verifyBtn">
                <i class="fas fa-check"></i> Подтвердить
            </button>

            <div class="resend-link">
                <a href="#" id="resendLink">Отправить код снова</a>
            </div>
        </div>

        <!-- Step 3: New password -->
        <div id="passwordStep" class="reset-form-step">
            <div class="reset-header">
                <h1><i class="fas fa-lock"></i> Новый пароль</h1>
                <p>Введите новый пароль</p>
            </div>

            <div id="passwordErrorMessage" class="error-message"></div>
            <div id="passwordSuccessMessage" class="success-message"></div>

            <form id="passwordForm">
                <div class="form-group">
                    <label for="newPassword">Новый пароль</label>
                    <input type="password" id="newPassword" name="password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Подтвердите пароль</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <button type="submit" class="reset-btn" id="passwordBtn">
                    <i class="fas fa-save"></i> Сохранить пароль
                </button>
            </form>
        </div>

        <div class="links">
            <a href="login.html">Войти</a>
            <a href="register.html">Регистрация</a>
            <a href="support.html">Поддержка</a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        let resetToken = '';

        // Step 1: Request password reset
        document.getElementById('requestForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const requestBtn = document.getElementById('requestBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            requestBtn.disabled = true;
            requestBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Отправка...';
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/auth/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email }),
                });

                const data = await response.json();

                if (response.ok) {
                    successMessage.textContent = 'Код сброса отправлен на ваш email!';
                    successMessage.style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('requestStep').classList.remove('active');
                        document.getElementById('verifyStep').classList.add('active');
                    }, 2000);
                } else {
                    errorMessage.textContent = data.message || 'Ошибка отправки';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorMessage.textContent = 'Ошибка сети. Попробуйте позже.';
                errorMessage.style.display = 'block';
            } finally {
                requestBtn.disabled = false;
                requestBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Отправить код';
            }
        });

        // Code input handling
        const codeInputs = document.querySelectorAll('.code-input');
        codeInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < codeInputs.length - 1) {
                    codeInputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    codeInputs[index - 1].focus();
                }
            });
        });

        // Step 2: Verify code
        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const code = Array.from(codeInputs).map(input => input.value).join('');
            const email = document.getElementById('email').value;
            const verifyErrorMessage = document.getElementById('verifyErrorMessage');
            const verifySuccessMessage = document.getElementById('verifySuccessMessage');

            if (code.length !== 6) {
                verifyErrorMessage.textContent = 'Введите полный 6-значный код';
                verifyErrorMessage.style.display = 'block';
                verifySuccessMessage.style.display = 'none';
                return;
            }

            verifyErrorMessage.style.display = 'none';
            verifySuccessMessage.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/auth/verify-reset-code`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, code }),
                });

                const data = await response.json();

                if (response.ok) {
                    resetToken = data.token;
                    verifySuccessMessage.textContent = 'Код подтвержден!';
                    verifySuccessMessage.style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('verifyStep').classList.remove('active');
                        document.getElementById('passwordStep').classList.add('active');
                    }, 1500);
                } else {
                    verifyErrorMessage.textContent = data.message || 'Неверный код';
                    verifyErrorMessage.style.display = 'block';
                }
            } catch (error) {
                verifyErrorMessage.textContent = 'Ошибка сети. Попробуйте позже.';
                verifyErrorMessage.style.display = 'block';
            }
        });

        // Resend code
        document.getElementById('resendLink').addEventListener('click', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const verifyErrorMessage = document.getElementById('verifyErrorMessage');

            try {
                const response = await fetch(`${API_BASE}/auth/forgot-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email }),
                });

                if (response.ok) {
                    verifyErrorMessage.style.display = 'none';
                    alert('Код отправлен повторно');
                } else {
                    verifyErrorMessage.textContent = 'Ошибка отправки';
                    verifyErrorMessage.style.display = 'block';
                }
            } catch (error) {
                verifyErrorMessage.textContent = 'Ошибка сети';
                verifyErrorMessage.style.display = 'block';
            }
        });

        // Step 3: Set new password
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const passwordErrorMessage = document.getElementById('passwordErrorMessage');
            const passwordSuccessMessage = document.getElementById('passwordSuccessMessage');

            if (password !== confirmPassword) {
                passwordErrorMessage.textContent = 'Пароли не совпадают';
                passwordErrorMessage.style.display = 'block';
                passwordSuccessMessage.style.display = 'none';
                return;
            }

            passwordErrorMessage.style.display = 'none';
            passwordSuccessMessage.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token: resetToken, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    passwordSuccessMessage.textContent = 'Пароль успешно изменен! Перенаправление на вход...';
                    passwordSuccessMessage.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    passwordErrorMessage.textContent = data.message || 'Ошибка сброса пароля';
                    passwordErrorMessage.style.display = 'block';
                }
            } catch (error) {
                passwordErrorMessage.textContent = 'Ошибка сети. Попробуйте позже.';
                passwordErrorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
